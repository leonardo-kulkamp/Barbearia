<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <header>
        <div class="caixa">
            <h1> <img src="logo.png" alt=""></h1>
            <nav>
                <ul>
                    <li> <a href="index.html"> Home </a></li>
                    <li> <a href="produtos.html"> Produtos </a></li>
                </ul>
            </nav>
        </div>
    </header>

<main>
    <form>
        <h1> FALE CONOSCO </h1>
        <fieldset>
            <p> Nome e sobrenome </p>
            <input type="text" class="input-texto" required>

            <p> Email </p>
            <input type="email" class="input-texto" required placeholder="seuemail@dominio.com">

            <p> Telefone </p>
            <input type="tel" class="input-texto" required placeholder="(XX) XXXXX-XXXX">

            <p> Mensagem </p>
            <textarea cols="70" rows="10" required></textarea>
        </fieldset>

            <fieldset>
                <legend>Como prefere o nosso contato?</legend>

                <p><input type="radio" name="contato" value="email"> Email</p>
                <p><input type="radio" name="contato" value="telefone"> Telefone</p>
                <p><input type="radio" name="contato" value="whatsapp" checked> WhatsApp</p>
            </fieldset>

        <fieldset>
            <legend>Qual o horário prefere ser atendido? </legend>
            <select>
                <option>Manhã</option>
                <option>Tarde</option>
                <option>Noite</option>
            </select>
        </fieldset>

        <p>
            <input type="checkbox" checked>Gostaria de receber nossas novidades por email?
        </p>

        <button class="enviar">Enviar formulário </button>
    </form>
</main>

<footer>
<img src="logo-branco.png">
<p class="copyright">&copy; Copyright Barbearia Alura - 2019</p>
</footer>

</body>
</html>
